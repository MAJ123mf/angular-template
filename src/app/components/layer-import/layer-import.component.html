<!-- Gumb za odpiranje panela -->
<button class="import-btn" 
        (click)="togglePanel()" 
        [matTooltip]="'IMPORT_TOOLTIP' | translate">
  <mat-icon>folder_open</mat-icon>
</button>

<!-- Panel z uvoženi sloji -->
<div class="import-panel" *ngIf="panelOpen">
  <div class="panel-header">
    <span>{{ 'IMPORT_PANEL_TITLE' | translate }}</span>
    <button class="add-btn" (click)="openFilePicker()" [matTooltip]="'IMPORT_ADD_TOOLTIP' | translate">
      <mat-icon>add</mat-icon>
    </button>
  </div>

  <div class="no-layers" *ngIf="layers.length === 0">
    <span>{{ 'IMPORT_NO_LAYERS' | translate }}</span>
    <button class="open-file-btn" (click)="openFilePicker()">{{ 'IMPORT_OPEN_FILE' | translate }}</button>
  </div>

  <div class="layer-item" *ngFor="let layer of layers">
    <mat-icon class="vis-icon" 
              (click)="toggleVisibility(layer.id)"
              [matTooltip]="(layer.visible ? 'IMPORT_HIDE' : 'IMPORT_SHOW') | translate">
      {{ layer.visible ? 'visibility' : 'visibility_off' }}
    </mat-icon>
    <span class="layer-title" [title]="layer.title">{{ layer.title }}</span>
    <mat-icon class="zoom-icon"
              (click)="zoomToLayer(layer.id)"
              [matTooltip]="'IMPORT_ZOOM' | translate">
      zoom_in
    </mat-icon>
    <mat-icon class="del-icon" 
              (click)="removeLayer(layer.id)"
              [matTooltip]="'IMPORT_DELETE' | translate">
      delete
    </mat-icon>
  </div>
</div>
