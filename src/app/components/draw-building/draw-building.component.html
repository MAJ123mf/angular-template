

@if (drawMode) {
  <button 
    mat-button 
    (click)="toggleDrawMode()" 
    [matTooltip]="'BUILDING_DRAW_STOP' | translate">
    <mat-icon>clear</mat-icon>
  </button>
  <button 
    id="select-building"
    mat-button 
    (click)="selectBuilding()" 
    [disabled]="drawMode"
    [matTooltip]="(selectMode ? 'BUILDING_SELECT_STOP' : 'BUILDING_SELECT_START') | translate">
    <mat-icon>{{ selectMode ? 'select_all' : 'near_me' }}</mat-icon>
  </button>
  <button 
    id="edit-building"
    mat-button 
    (click)="editBuilding()" 
    [disabled]="drawMode"
    [matTooltip]="(editMode ? 'BUILDING_EDIT_STOP' : 'BUILDING_EDIT_START') | translate">
    <mat-icon>{{ editMode ? 'done_outline' : 'create' }}</mat-icon>
  </button>
} @else {
  <button 
    mat-button 
    (click)="toggleDrawMode()" 
    [disabled]="!canDraw"
    [matTooltip]="'BUILDING_DRAW_START' | translate">
    <mat-icon>home</mat-icon>
  </button>

  <button 
    id="select-building"
    mat-button 
    (click)="selectBuilding()" 
    [disabled]="!canDraw || drawMode"
    [matTooltip]="(selectMode ? 'BUILDING_SELECT_STOP' : 'BUILDING_SELECT_START') | translate">
    <mat-icon>{{ (!canDraw || drawMode) ? 'near_me' : (selectMode ? 'select_all' : 'near_me') }}</mat-icon>
  </button>

  <button 
    id="edit-building"
    mat-button 
    (click)="editBuilding()" 
    [disabled]="!canDraw || drawMode"
    [matTooltip]="(editMode ? 'BUILDING_EDIT_STOP' : 'BUILDING_EDIT_START') | translate">
    <mat-icon>{{ (!canDraw || drawMode) ? 'create' : (editMode ? 'done_outline' : 'create') }}</mat-icon>
  </button>
}
