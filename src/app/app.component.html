<div class="container">
  <div class="menu">
    <app-menu (formSelected)="switchForm($event)"></app-menu>

    <!-- PREKLOPNIK TEME -->
    <button class="theme-toggle" 
        (click)="toggleTheme()" 
        [title]="currentTheme === 'light' ? 'Temna tema' : currentTheme === 'dark' ? 'Custom tema' : 'Svetla tema'">
        {{ currentTheme === 'light' ? '🌙' : currentTheme === 'dark' ? '🎨' : '☀️' }}
    </button>

    <!-- PREKLOPNIK JEZIKOV -->
    <div class="language-switcher">
      <button 
        *ngFor="let lang of languageService.availableLanguages"
        [class.active]="lang.code === languageService.getCurrentLanguage()"
        (click)="languageService.setLanguage(lang.code)">
        {{ lang.flag }} {{ lang.label }}
      </button>
    </div>
  </div>

  <div class="main">
    <!-- ZGORNJI DEL: forma + karta -->
    <div class="top" [style.height.%]="topHeight">

      <!-- LEVI PANEL z collapse gumbom -->
      <div class="left" [style.width.%]="leftCollapsed ? 0 : leftWidth" [class.collapsed]="leftCollapsed">
        <ng-container [ngSwitch]="selectedType">
          <app-parcel-form 
              *ngSwitchCase="'parcel'" 
              (saved)="refreshTable()"
              (statusMessage)="updateStatus($event)">
          </app-parcel-form>
          <app-building-form 
              *ngSwitchCase="'building'" 
              (saved)="refreshTable()"
              (statusMessage)="updateStatus($event)">
          </app-building-form>
          <app-road-form 
              *ngSwitchCase="'road'" 
              (saved)="refreshTable()"
              (statusMessage)="updateStatus($event)">
          </app-road-form>
          <app-address-form 
              *ngSwitchCase="'address'" 
              (saved)="refreshTable()"
              (statusMessage)="updateStatus($event)">
          </app-address-form>
        </ng-container>
      </div>

      <!-- Drsni razdelilnik levo-desno z collapse gumbom -->
      <div class="divider" (mousedown)="startResizeX($event)">
        <button class="collapse-btn-left"
                (click)="toggleLeft()"
                [title]="leftCollapsed ? 'Prikaži panel' : 'Skrij panel'">
          {{ leftCollapsed ? '▶' : '◀' }}
        </button>
      </div>

      <div class="right">
        <app-map></app-map>
      </div>
    </div>

    <!-- Vertikalni razdelilnik gor-dol z collapse gumbom -->
    <div class="dividerY" (mousedown)="startResizeY($event)">
      <button class="collapse-btn-table" 
              (click)="toggleTable()" 
              [title]="tableCollapsed ? 'Prikaži tabelo' : 'Skrij tabelo'">
        {{ tableCollapsed ? '▲' : '▼' }}
      </button>
    </div>


        <!-- SPODNJI DEL: tabela -->
    <div class="bottom" [style.height.%]="100 - topHeight">
      <ng-container [ngSwitch]="selectedType">
        <app-parcel-table 
           *ngSwitchCase="'parcel'"
           (editParcel)="handleEditParcel($event)" 
           (statusMessage)="updateStatus($event)"
           (saved)="refreshTable()"> 
        </app-parcel-table>
        <app-building-table 
           *ngSwitchCase="'building'"
           (editBuilding)="handleEditBuilding($event)" 
           (statusMessage)="updateStatus($event)"
           (saved)="refreshTable()"> 
        </app-building-table>        
        <app-road-table 
           *ngSwitchCase="'road'" 
           (editRoad)="handleEditRoad($event)" 
           (statusMessage)="updateStatus($event)"
           (saved)="refreshTable()"> 
        </app-road-table>
        <app-address-table 
           *ngSwitchCase="'address'" 
           (editAddress)="handleEditAddress($event)" 
           (statusMessage)="updateStatus($event)"
           (saved)="refreshTable()">
        </app-address-table> 
      </ng-container>
    </div>
  </div>

  <div class="status">{{statusText}}</div>
</div>

<!-- POMOČ - Alt+F1 -->
<div *ngIf="helpVisible" class="help-overlay" (click)="helpVisible = false">
  <div class="help-dialog" (click)="$event.stopPropagation()">
    <h2>{{ 'HELP_TITLE' | translate }}</h2>
    <table>
      <tr><th>{{ 'HELP_COL_SHORTCUT' | translate }}</th><th>{{ 'HELP_COL_DESC' | translate }}</th></tr>
      <tr><td>Alt + F1</td><td>{{ 'HELP_ALT_F1' | translate }}</td></tr>
      <tr><td>Fn + F1 / F1</td><td>{{ 'HELP_F1' | translate }}</td></tr>
      <tr><td>Alt + Shift + E</td><td>{{ 'HELP_ALT_SHIFT_E' | translate }}</td></tr>
      <tr><td>Escape</td><td>{{ 'HELP_ESCAPE' | translate }}</td></tr>
    </table>
    <div class="help-footer">
      <button (click)="helpVisible = false">{{ 'HELP_CLOSE' | translate }}</button>
    </div>
  </div>
</div>
